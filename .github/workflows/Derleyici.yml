 # Bu araç @keyiflerolsun tarafından | @KekikAkademi için yazılmıştır.
 name: CloudStream Derleyici
 concurrency:
   group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
   cancel-in-progress: true
 
 on:
   workflow_dispatch:
   push:
     branches:
       - master
     paths-ignore:
       - "**/*.md"
       - "**/*.yml"
       - "**/*.jpg"
       - "**/*.png"
       - "**/*.py"
 
 jobs:
   CloudStreamDerleyici:
     runs-on: ubuntu-latest
     steps:
       - name: "'src' Depo Kontrolü"
         uses: actions/checkout@v4.2.2
         with:
           path: "src"
 
       - name: "'build' Depo Kontrolü"
         uses: actions/checkout@v4.2.2
         with:
           ref: "builds"
           path: "builds"
 
       - name: Eski Derlemeleri Temizle (InatBox.cs3 Hariç)
         run: |
           # InatBox.cs3 haricindeki tüm .cs3 dosyalarını siler
           find $GITHUB_WORKSPACE/builds -maxdepth 1 -name "*.cs3" ! -name "InatBox.cs3" -type f -delete || true
 
       - name: JDK 17 Ayarla
         uses: actions/setup-java@v4.6.0
         with:
           distribution: adopt
           java-version: 17
 
       - name: Android SDK Ayarla
         uses: android-actions/setup-android@v3.2.2
 
       - name: Eklentileri Derle (InatBox'ı Derleme)
         run: |
           cd $GITHUB_WORKSPACE/src
           chmod +x gradlew
           # -x :InatBox:make komutu InatBox klasörünün derlenmesini engeller
           ./gradlew make makePluginsJson -x :InatBox:make
           cp **/build/*.cs3 $GITHUB_WORKSPACE/builds
           cp build/plugins.json $GITHUB_WORKSPACE/builds

       - name: '@KekikAkademi ifadesini değiştir'
         run: |
           sed -i 's/@KekikAkademi/@feroxxcs3/g' $GITHUB_WORKSPACE/builds/repo.json
 
       - name: Derlemeleri Yükle
         run: |
           cd $GITHUB_WORKSPACE/builds
           git config --local user.email "actions@github.com"
           git config --local user.name "GitHub Actions"
           git add .
           # Eğer commit edilecek bir şey yoksa hata verme (InatBox.cs3 korunur)
           git commit --amend -m "$GITHUB_SHA 'nın Derlenmesi" || exit 0
           git push --force 
